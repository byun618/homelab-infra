services:
  github-runner:
    image: myoung34/github-runner:latest
    container_name: home-coffing-runner
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REPO_URL: https://github.com/byun618/home-coffing
      RUNNER_NAME: home-coffing-mac-mini
      RUNNER_WORKDIR: /tmp/runner/work
      LABELS: self-hosted,linux,ARM64
      EPHEMERAL: "false"
      DISABLE_AUTO_UPDATE: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /Users/homelab/repos/byun618/homelab-infra/services:/Users/homelab/repos/byun618/homelab-infra/services
      - runner-work:/tmp/runner/work

volumes:
  runner-work:
